version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: weixintishici-backend-dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - ./backend/node_modules:/app/node_modules
      - ./data:/app/data
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=file:./data/prompts.db
    command: npm run dev
    networks:
      - weixintishici-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: weixintishici-frontend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - ./frontend/node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev
    networks:
      - weixintishici-network
    depends_on:
      - backend

volumes:
  data:

networks:
  weixintishici-network:
    driver: bridge
