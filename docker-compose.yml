version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: weixintishici-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      # 持久化数据库
      - ./data:/app/data
      # 日志目录
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=file:./data/prompts.db
      - JWT_SECRET=${JWT_SECRET:-weixintishici-secret-key-2024}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - MEMOS_API_URL=${MEMOS_API_URL:-}
      - MEMOS_API_KEY=${MEMOS_API_KEY:-}
    networks:
      - weixintishici-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: weixintishici-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - weixintishici-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: weixintishici-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - weixintishici-network
    depends_on:
      - frontend
      - backend
    profiles:
      - with-nginx

volumes:
  data:
  logs:

networks:
  weixintishici-network:
    driver: bridge
